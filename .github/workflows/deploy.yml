name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      # Static assets (JS/CSS) - long cache with hashed filenames
      - run: aws s3 sync out/_next/ s3://daily-news-collector-149101264858/_next/ --cache-control "public,max-age=31536000,immutable" --delete

      # HTML files - no cache so updates are immediate
      - run: aws s3 sync out/ s3://daily-news-collector-149101264858/ --exclude "_next/*" --cache-control "public,max-age=0,must-revalidate" --delete

      - run: aws cloudfront create-invalidation --distribution-id EQZQXK83G1TPE --paths "/*" --region us-east-1
